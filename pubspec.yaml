name: studytracker
description: A Flutter study tracking app with gamification.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  drift: ^2.31.0
  drift_flutter: ^0.2.8
  sqlite3_flutter_libs: ^0.5.0

  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  go_router: ^17.1.0

  syncfusion_flutter_pdfviewer: ^31.2.0

  fl_chart: ^1.2.0

  dynamic_color: ^1.7.0
  google_fonts: ^6.2.0
  flex_color_picker: ^3.5.0

  file_picker: ^8.1.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0

  flutter_local_notifications: ^17.2.0
  flutter_foreground_task: ^8.17.0

  confetti: ^0.7.0
  timezone: ^0.9.0

  url_launcher: ^6.3.0

  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.3.0

dev_dependencies:
  build_runner: ^2.4.0
  drift_dev: ^2.31.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^3.0.3
  riverpod_lint: ^3.0.3
  flutter_lints: ^4.0.0
  custom_lint: ^0.8.1

flutter:
  uses-material-design: true

dependency_overrides:
  path_provider_android: ^2.3.1
